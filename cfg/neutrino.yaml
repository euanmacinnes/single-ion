# neutrino configuration — used when running the freeradicals embedded binary.
# See neutrino/cfg/neutrino.yaml for the full option set.

bind: "0.0.0.0:4748"
# Path to Jinja2 deployment templates — adjust if running from a different working directory.
templates_dir: ../neutrino/templates
namespace: default

# Enable Gluon for inter-kernel communication and telemetry.
# The actual Gluon WebSocket URL is injected at runtime by single-ion/main.rs
# via NEUTRINO_GLUON__INTERNAL_URL (derived from gluon.bind), so no hardcoded
# URL is needed here.
gluon:
  enabled: true
